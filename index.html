<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Ceosden</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --bg-start: #050509;
      --bg-end: #4b1b8f;
      --accent: #c084fc;
      --text-main: #f9f5ff;
      --text-muted: #a3a3b3;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text-main);
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        linear-gradient(135deg, var(--bg-start), var(--bg-end));
      position: relative;
      overflow: hidden;
    }

    /* Grid background */
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.06) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.35;
      pointer-events: none;
      mix-blend-mode: soft-light;
    }

    .glow-orb {
      position: absolute;
      width: 420px;
      height: 420px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #e879f9, transparent 60%);
      filter: blur(12px);
      opacity: 0.45;
      top: -80px;
      right: -60px;
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 1;
      max-width: 520px;
      width: 90%;
      padding: 2.5rem 2.25rem;
      border-radius: 1.5rem;
      background: rgba(5, 5, 15, 0.85);
      border: 1px solid rgba(192, 132, 252, 0.35);
      box-shadow:
        0 18px 45px rgba(0, 0, 0, 0.75),
        0 0 40px rgba(192, 132, 252, 0.25);
      backdrop-filter: blur(18px);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      background: rgba(24, 24, 40, 0.9);
      border: 1px solid rgba(192, 132, 252, 0.5);
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 1.25rem;
    }

    .badge-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 12px rgba(192, 132, 252, 0.9);
    }

    h1 {
      font-size: clamp(2.4rem, 4vw, 3rem);
      margin-bottom: 0.75rem;
      letter-spacing: 0.04em;
    }

    h1 span {
      color: var(--accent);
    }

    .subtitle {
      font-size: 0.98rem;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 1.75rem;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 2rem;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .meta-item {
      padding: 0.4rem 0.75rem;
      border-radius: 999px;
      background: rgba(24, 24, 40, 0.9);
      border: 1px solid rgba(63, 63, 94, 0.9);
    }

    .cta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
    }

    .btn-primary {
      padding: 0.7rem 1.4rem;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #050509;
      background: linear-gradient(135deg, #e879f9, #a855f7);
      box-shadow:
        0 12px 30px rgba(168, 85, 247, 0.55),
        0 0 18px rgba(232, 121, 249, 0.7);
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow:
        0 16px 40px rgba(168, 85, 247, 0.7),
        0 0 22px rgba(232, 121, 249, 0.9);
      opacity: 0.96;
    }

    .btn-ghost {
      padding: 0.7rem 1.1rem;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.5);
      background: transparent;
      color: var(--text-muted);
      font-size: 0.85rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      transition: border-color 0.15s ease, color 0.15s ease, background 0.15s ease;
    }

    .btn-ghost:hover {
      border-color: rgba(192, 132, 252, 0.8);
      color: var(--text-main);
      background: rgba(15, 23, 42, 0.7);
    }

    .btn-ghost span {
      font-size: 1rem;
    }

    @media (max-width: 600px) {
      .card {
        padding: 2rem 1.5rem;
      }

      .cta-row {
        flex-direction: column;
        align-items: stretch;
      }

      .btn-primary,
      .btn-ghost {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div class="glow-orb"></div>

  <main class="card">
    <div class="badge">
      <span class="badge-dot"></span>
      <span>Ceosden is loading</span>
    </div>

    <h1>Welcome to <span>Ceosden</span></h1>

    <p class="subtitle">
      A future home for bold ideas, sharp strategy, and the minds that move things forward.
      This is just a placeholder—for now.
    </p>

    <div class="meta">
      <div class="meta-item">Status: In development</div>
      <div class="meta-item">Theme: Black &amp; purple grid</div>
      <div class="meta-item">Owner: Ceosden</div>
    </div>

    <div class="cta-row">
      <button class="btn-primary">
        Notify me soon
      </button>
      <button class="btn-ghost">
        <span>⌛</span>
        Placeholder v1.0
      </button>
    </div>
  </main>
</body>
</html>
