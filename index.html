<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ceosden — Coming Soon</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(180deg, #000000, #3b0a63);
    overflow: hidden;
    font-family: "Segoe UI", sans-serif;
    color: #d7b4ff;
  }

  /* Moving grid */
  .grid {
    position: absolute;
    inset: 0;
    background-size: 60px 60px;
    background-image:
      linear-gradient(rgba(255,255,255,0.08) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.08) 1px, transparent 1px);
    animation: moveGrid 18s linear infinite;
    opacity: 0.35;
  }

  @keyframes moveGrid {
    0% { transform: translate(0,0); }
    100% { transform: translate(-120px, -120px); }
  }

  /* Glow orb */
  .orb {
    position: absolute;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(180,0,255,0.45), transparent 70%);
    top: -120px;
    right: -120px;
    filter: blur(20px);
    pointer-events: none;
  }

  .content {
    position: relative;
    text-align: center;
    z-index: 2;
  }

  h1 {
    font-size: 4rem;
    margin: 0;
    background: linear-gradient(180deg, #d48aff, #8f3bff);
    -webkit-background-clip: text;
    color: transparent;
    letter-spacing: 3px;
  }

  p {
    margin-top: 10px;
    font-size: 1.2rem;
    opacity: 0.8;
  }
</style>
</head>

<body>
  <div class="grid"></div>
  <div class="orb"></div>

  <div class="content">
    <h1>CEOSDEN</h1>
    <p>coming soon...</p>
  </div>
</body>
</html>
